name: Cloudflare Pages Cleanup

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      mode:
        required: false
        type: string
        default: 'keep-latest'
      commit-sha:
        required: false
        type: string
    secrets:
      cloudflare-api-token:
        required: true
      cloudflare-account-id:
        required: true
      cloudflare-project-name:
        required: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    concurrency:
      group: cf-cleanup-${{ inputs.branch }}
      cancel-in-progress: true
    env:
      CF_API_TOKEN: ${{ secrets[cloudflare-api-token] }}
      CF_ACCOUNT_ID: ${{ secrets[cloudflare-account-id] }}
      CF_PAGES_PROJECT: ${{ secrets[cloudflare-project-name] }}
      BRANCH: ${{ inputs.branch }}
      MODE: ${{ inputs.mode }}
      COMMIT_SHA: ${{ inputs.commit-sha }}
    steps:
      - name: Checkout workflows repo
        uses: actions/checkout@v4
        with:
          repository: am-kenny/cloudflare-workflows
          path: .shared

      - name: Run cleanup
        run: bash .shared/.github/scripts/cf-cleanup-deployments.sh
